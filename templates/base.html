<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Anniversary ❤️</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="bg-blur bg-blur-1"></div>
    <div class="bg-blur bg-blur-2"></div>
    <div class="bg-blur bg-blur-3"></div>

    <nav class="navbar">
        <div class="nav-logo">Us ❤️</div>

        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/memory">Memory Lane</a>
            <a href="/timeline">Our Story</a>
            <a href="/emotions">For You</a>
            <a href="/surprise">Surprise</a>
        </div>
    </nav>

    <div class="music-player">
        <button class="music-btn" id="music-btn" onclick="toggleMusic()">🔇</button>
    </div>

    <audio id="bg-music" loop preload="auto">
        <source src="{{ url_for('static', filename='music/SomeoneToyou.mp4') }}" type="audio/mp4">
    </audio>

    <main class="page-shell">
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
